build:
  maxIssues: 0

complexity:
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    threshold: 6
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    threshold: 20
    ignorePrivate: true

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: false

naming:
  FunctionNaming:
    active: true
  VariableNaming:
    active: true
  PackageNaming:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Exception'
      - 'RuntimeException'
  SwallowedException:
    active: true

performance:
  SpreadOperator:
    active: false
